<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自动插入功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: white; }
        .test-area { margin: 20px 0; padding: 20px; background: #2d2d30; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 3px; cursor: pointer; font-size: 14px; }
        #auto-insert-toggle { background: #4CAF50; color: white; }
        .log { background: #1e1e1e; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .status-bar { background: #007acc; color: white; padding: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔧 自动插入功能测试页面</h1>
    
    <div class="test-area">
        <h2>测试1: 按钮是否可见</h2>
        <button id="auto-insert-toggle" onclick="toggleAutoInsert()">🤖 自动插入: 开</button>
        <button onclick="testLog('其他按钮点击正常')">测试普通按钮</button>
    </div>

    <div class="test-area">
        <h2>测试2: 函数调用测试</h2>
        <button onclick="testToggle()">直接调用toggleAutoInsert()</button>
        <button onclick="testUpdateStatus()">测试updateStatus()</button>
    </div>

    <div class="test-area">
        <h2>测试3: 变量状态</h2>
        <button onclick="checkVariables()">检查autoInsertCode变量</button>
    </div>

    <div class="status-bar" id="status-text">就绪</div>
    <div class="log" id="log"></div>

    <script>
        let autoInsertCode = true;
        const logDiv = document.getElementById('log');

        function testLog(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(message) {
            document.getElementById('status-text').textContent = message;
            testLog(`updateStatus 被调用: ${message}`);
            setTimeout(() => {
                document.getElementById('status-text').textContent = '就绪';
            }, 3000);
        }

        function toggleAutoInsert() {
            testLog('toggleAutoInsert 函数被调用');
            autoInsertCode = !autoInsertCode;
            const btn = document.getElementById('auto-insert-toggle');
            if (btn) {
                btn.textContent = autoInsertCode ? '🤖 自动插入: 开' : '🤖 自动插入: 关';
                btn.style.background = autoInsertCode ? '#4CAF50' : '#f44336';
                testLog(`按钮文本更新为: ${btn.textContent}`);
                testLog(`按钮背景更新为: ${btn.style.background}`);
            } else {
                testLog('ERROR: 找不到按钮元素！');
            }
            updateStatus(autoInsertCode ? '已开启自动插入' : '已关闭自动插入');
        }

        function testToggle() {
            toggleAutoInsert();
        }

        function testUpdateStatus() {
            updateStatus('这是测试消息');
        }

        function checkVariables() {
            testLog(`autoInsertCode = ${autoInsertCode}`);
            testLog(`typeof toggleAutoInsert = ${typeof toggleAutoInsert}`);
            testLog(`typeof updateStatus = ${typeof updateStatus}`);
            const btn = document.getElementById('auto-insert-toggle');
            testLog(`按钮元素存在: ${btn !== null}`);
            if (btn) {
                testLog(`按钮onclick属性: ${btn.getAttribute('onclick')}`);
            }
        }

        // 页面加载完成后自动检查
        window.addEventListener('DOMContentLoaded', () => {
            testLog('页面加载完成');
            checkVariables();
        });
    </script>
</body>
</html>
