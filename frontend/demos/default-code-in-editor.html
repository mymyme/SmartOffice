      @keyframes woodTap {
        0% { transform: scale(1); }
        50% { transform: scale(0.97) translateY(3px); }
        100% { transform: scale(1); }
      }
      .counter-shine {
        position: relative;
        overflow: hidden;
      }
      .counter-shine::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;

          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0) 100%

<body class="bg-stone-light min-h-screen flex flex-col items-center justify-between p-4 mat-texture">
	<!-- 页面容器 -->
	<div class="w-full max-w-3xl mx-auto flex flex-col min-h-screen">

		<!-- 头部 -->
		<header class="py-8 text-center">
			<h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-wood-darker mb-2 tracking-wide"><br></h1>
			<h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-wood-darker mb-2 tracking-wide">文档用我</h1>
			<h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-wood-darker mb-2 tracking-wide">摸鱼赛博</h1>
			<p class="text-wood-dark text-lg md:text-xl italic">
				<i class="fa fa-leaf mr-2 text-accent-green"></i>敲击木鱼，积累功德<i
					class="fa fa-leaf ml-2 text-accent-green"></i>
			</p>

			<!-- 装饰线 -->
			<div class="w-32 h-px bg-gradient-to-r from-transparent via-wood-dark to-transparent mx-auto mt-4"></div>
		</header>

		<!-- 主要内容 -->
		<main class="flex-grow flex flex-col items-center justify-center my-4">
			<!-- 功德计数器 -->
			<div
				class="mb-12 w-[clamp(200px,60vw,300px)] h-32 rounded-xl border-2 border-wood-dark bg-stone counter-shine shadow-counter flex items-center justify-center relative overflow-hidden">
				<div class="absolute inset-0 bg-black/5 mix-blend-overlay"></div>
				<div class="relative z-10 text-center">
					<p class="text-wood-darker text-sm uppercase tracking-wider mb-1">当前功德</p>
					<div class="text-[clamp(2.5rem,8vw,4rem)] font-bold text-accent-gold" id="meritCounter">666</div>
				</div>
				<!-- 计数器边缘装饰 -->
				<div
					class="absolute top-2 left-2 right-2 bottom-2 border border-white/10 rounded-lg pointer-events-none">
				</div>
			</div>

			<!-- 木鱼区域 -->
			<div class="relative w-full flex justify-center mb-16" id="woodenFishContainer">
				<!-- 木鱼底座 -->
				<div
					class="absolute w-[clamp(200px,70vw,380px)] h-12 bg-wood-dark/20 rounded-full -bottom-4 z-0 blur-sm">
				</div>

				<!-- 木鱼图像 -->
				<div id="woodenFish"
					class="w-[clamp(200px,70vw,380px)] h-auto cursor-pointer relative z-10 transition-all duration-300 hover:scale-105">
					<!-- 拟物化木鱼SVG -->
					<svg viewBox="0 0 380 220" fill="none" xmlns="http://www.w3.org/2000/svg">
						<!-- 木鱼主体 -->
						<path
							d="M60,160 C60,110 90,60 190,60 C290,60 320,110 320,160 L320,175 C320,185 310,195 190,195 C70,195 60,185 60,175 L60,160 Z"
							class="wood-gradient wood-grain" stroke="#7D5A37" stroke-width="2"></path>

						<!-- 木纹细节 -->
						<path d="M80,100 C120,80 160,90 190,80 C220,70 260,85 300,100" stroke="#A67C52" stroke-width="1"
							opacity="0.6" stroke-dasharray="2,1"></path>
						<path d="M80,130 C140,110 240,110 300,130" stroke="#A67C52" stroke-width="1" opacity="0.7">
						</path>
						<path d="M80,160 C120,150 260,150 300,160" stroke="#A67C52" stroke-width="1" opacity="0.5"
							stroke-dasharray="3,2"></path>

						<!-- 木鱼凹槽 -->
						<ellipse cx="190" cy="100" rx="60" ry="25" fill="#7D5A37" opacity="0.2"></ellipse>

						<!-- 高光效果 -->
						<path d="M65,160 C80,120 120,80 190,70 C260,80 300,120 315,160" stroke="#FFFFFF"
							stroke-width="1.5" opacity="0.3"></path>

						<!-- 装饰点 -->
						<circle cx="120" cy="120" r="3" fill="#7D5A37" opacity="0.7"></circle>
						<circle cx="260" cy="120" r="3" fill="#7D5A37" opacity="0.7"></circle>
					</svg>
				</div>

				<!-- 点击提示 -->
				<div
					class="absolute -bottom-10 left-1/2 transform -translate-x-1/2 bg-wood/90 text-white text-sm px-4 py-2 rounded-full shadow-md flex items-center animate-pulse">
					<i class="fa fa-hand-pointer-o mr-2"></i> 点击木鱼积累功德
				</div>
				<div class="merit-float text-accent-gold font-bold text-xl"
					style="left: calc(50% + 29.9329px); top: 35%; transform: rotate(-2.65601deg);">+1</div>
				<div class="merit-float text-accent-gold font-bold text-xl"
					style="left: calc(50% - 8.20359px); top: 35%; transform: rotate(-11.4336deg);">+1</div>
			</div>

			<!-- 功能按钮区 -->
			<div class="flex flex-wrap justify-center gap-4 w-full">
				<button id="resetBtn"
					class="px-6 py-3 wood-gradient wood-grain text-white rounded-lg shadow-button hover:shadow-button-pressed active:shadow-button-pressed transition-all duration-200 flex items-center border border-wood-dark/30">
					<i class="fa fa-refresh mr-2"></i> 重置功德
				</button>
				<button id="autoBtn"
					class="px-6 py-3 text-white rounded-lg shadow-button hover:shadow-button-pressed active:shadow-button-pressed transition-all duration-200 flex items-center border bg-accent-red/90 border-accent-red/50"><i
						class="fa fa-stop mr-2"></i> 停止自动</button>
				<button id="soundBtn"
					class="px-6 py-3 metal-gradient text-wood-darker rounded-lg shadow-button hover:shadow-button-pressed active:shadow-button-pressed transition-all duration-200 flex items-center border border-stone-dark/30">
					<i class="fa fa-volume-up mr-2" id="soundIcon"></i> 音效: 开
				</button>
			</div>
		</main>

		<!-- 页脚 -->
		<footer class="py-6 text-center text-wood-dark/70 text-sm mt-8">
			<div class="mb-2 flex justify-center items-center space-x-3">
				<div class="h-px w-12 bg-wood-dark/30"></div>
				<p>摸鱼也能积累功德</p>
				<div class="h-px w-12 bg-wood-dark/30"></div>
			</div>
			<p>© 2023 -Foever赛博摸鱼系统 | 佛系摸鱼，快乐工作</p>
		</footer>
	</div>

	<!-- 音效元素 -->
	<audio id="tapSound" preload="auto">
		<source src="https://assets.mixkit.co/sfx/preview/mixkit-wood-hit-2015.mp3" type="audio/mpeg">
	</audio>

	<!-- JavaScript -->
	<script>
		// 获取DOM元素
		const woodenFish = document.getElementById('woodenFish');
		const meritCounter = document.getElementById('meritCounter');
		const resetBtn = document.getElementById('resetBtn');
		const autoBtn = document.getElementById('autoBtn');
		const soundBtn = document.getElementById('soundBtn');
		const soundIcon = document.getElementById('soundIcon');
		const tapSound = document.getElementById('tapSound');
		const container = document.getElementById('woodenFishContainer');

		// 功德值变量
		let merit = 0;
		let isAuto = false;
		let autoInterval;
		let soundEnabled = true;

		// 更新功德计数器显示
		function updateMeritDisplay() {
			meritCounter.textContent = merit;
			// 添加数字变化动画
			meritCounter.classList.add('scale-110');
			setTimeout(() => {
				meritCounter.classList.remove('scale-110');
			}, 200);
		}

		// 增加功德
		function addMerit() {
			merit++;
			updateMeritDisplay();

			// 创建功德+1动画元素
			const meritPopup = document.createElement('div');
			meritPopup.classList.add('merit-float', 'text-accent-gold', 'font-bold', 'text-xl');
			meritPopup.textContent = '+1';

			// 随机位置偏移
			const randomX = Math.random() * 120 - 60; // -60到60之间的随机数
			meritPopup.style.left = `calc(50% + ${randomX}px)`;
			meritPopup.style.top = '35%';

			// 随机旋转角度
			const randomRotate = Math.random() * 30 - 15;
			meritPopup.style.transform = `rotate(${randomRotate}deg)`;

			container.appendChild(meritPopup);

			// 动画结束后移除元素
			setTimeout(() => {
				meritPopup.remove();
			}, 1200);

			// 播放音效
			if (soundEnabled) {
				tapSound.currentTime = 0;
				tapSound.play().catch(e => console.log('音效播放失败:', e));
			}

			// 木鱼点击动画
			woodenFish.classList.add('wood-tap');
			setTimeout(() => {
				woodenFish.classList.remove('wood-tap');
			}, 200);
		}

		// 重置功德
		function resetMerit() {
			// 添加确认动画效果
			meritCounter.classList.add('text-accent-red', 'scale-125');
			setTimeout(() => {
				merit = 0;
				updateMeritDisplay();
				meritCounter.classList.remove('text-accent-red', 'scale-125');
			}, 300);
		}

		// 切换自动功德模式
		function toggleAutoMerit() {
			isAuto = !isAuto;

			if (isAuto) {
				autoBtn.innerHTML = '<i class="fa fa-stop mr-2"></i> 停止自动';
				autoBtn.classList.remove('bg-accent-green/90', 'border-accent-green/50');
				autoBtn.classList.add('bg-accent-red/90', 'border-accent-red/50');

				// 启动自动点击，每400ms一次
				autoInterval = setInterval(addMerit, 400);
			} else {
				autoBtn.innerHTML = '<i class="fa fa-bolt mr-2"></i> 自动功德';
				autoBtn.classList.remove('bg-accent-red/90', 'border-accent-red/50');
				autoBtn.classList.add('bg-accent-green/90', 'border-accent-green/50');

				// 停止自动点击
				clearInterval(autoInterval);
			}
		}

		// 切换音效
		function toggleSound() {
			soundEnabled = !soundEnabled;

			if (soundEnabled) {
				soundBtn.innerHTML = '<i class="fa fa-volume-up mr-2" id="soundIcon"></i> 音效: 开';
			} else {
				soundBtn.innerHTML = '<i class="fa fa-volume-off mr-2" id="soundIcon"></i> 音效: 关';
			}
		}

		// 事件监听
		woodenFish.addEventListener('click', addMerit);
		resetBtn.addEventListener('click', resetMerit);
		autoBtn.addEventListener('click', toggleAutoMerit);
		soundBtn.addEventListener('click', toggleSound);

		// 添加键盘支持，空格键敲木鱼
		document.addEventListener('keydown', (e) => {
			if (e.code === 'Space') {
				e.preventDefault(); // 防止页面滚动
				addMerit();
			}
		});

		// 添加触摸反馈增强
		woodenFish.addEventListener('touchstart', (e) => {
			e.preventDefault();
			woodenFish.classList.add('scale-98');
		});

		woodenFish.addEventListener('touchend', (e) => {
			e.preventDefault();
			woodenFish.classList.remove('scale-98');
			addMerit();
		});
	</script>
